<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>帖子详情</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<style>
.detail-wrap { max-width: 800px; margin: 20px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 1px 8px rgba(0,0,0,.08); }
.detail-wrap .tit { font-size: 20px; color: #333; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
.detail-wrap .meta { font-size: 13px; color: #999; margin-bottom: 15px; }
.detail-wrap .content { font-size: 15px; line-height: 1.7; color: #444; white-space: pre-wrap; }
.back { margin-top: 20px; }
</style>
</head>
<body>
<div id="app">
  <div class="detail-wrap">
    <div class="tit">{{detail.title}}</div>
    <div class="meta">{{detail.username}} · {{detail.addtime}}</div>
    <div class="content">{{detail.content}}</div>
    <div class="back"><a href="javascript:history.back()" class="layui-btn layui-btn-primary">返回</a></div>
  </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script>
function getParam(name) {
  var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
  var r = window.location.search.substr(1).match(reg);
  return r != null ? decodeURI(r[2]) : null;
}
var vue = new Vue({ el: '#app', data: { detail: {} } });
layui.use(['http'], function() {
  var http = layui.http;
  var id = getParam('id');
  if (!id) { layui.layer.msg('参数错误'); return; }
  http.request('luntan/detail/' + id, 'get', {}, function(res) {
    vue.detail = res.data || {};
  });
});
</script>
</body>
</html>
