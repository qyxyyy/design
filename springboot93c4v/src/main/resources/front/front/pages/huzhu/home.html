<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>户主首页</title>
  <link rel="stylesheet" href="../../layui/css/layui.css">
  <link rel="stylesheet" href="../../xznstatic/css/common.css"/>
  <link rel="stylesheet" href="../../xznstatic/css/style.css"/>
  <style>
    body { background: #f6f7fb; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 14px; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
    .card { background:#fff; border-radius: 12px; padding: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.06); cursor:pointer; transition: .15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,.10); }
    .card .name { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .card .desc { font-size: 12px; color:#6b7280; line-height: 1.4; }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">户主工作台</div>
    <div class="grid">
      <div class="card" onclick="go('../fangwuxinxi/add.html')">
        <div class="name">发布出租信息</div>
        <div class="desc">新增房源，填写图片 / 租金 / 位置等信息</div>
      </div>
      <div class="card" onclick="go('../fangwuxinxi/list.html')">
        <div class="name">我的出租信息</div>
        <div class="desc">查看和管理已发布房源</div>
      </div>
      <div class="card" onclick="go('./zhengming.html')">
        <div class="name">证明资料管理</div>
        <div class="desc">上传并管理身份证明、房产证明等资料</div>
      </div>
      <div class="card" onclick="go('./biaoqian.html')">
        <div class="name">房屋标签设置</div>
        <div class="desc">为房源设置“近地铁 / 拎包入住”等亮点标签</div>
      </div>
      <div class="card" onclick="go('../baoxiuxinxi/list.html')">
        <div class="name">报修处理</div>
        <div class="desc">查看报修信息，后续可扩展处理流程</div>
      </div>
      <div class="card" onclick="go('../kanfangshenqing/list.html')">
        <div class="name">租客咨询</div>
        <div class="desc">查看租客的看房申请与咨询记录</div>
      </div>
      <div class="card" onclick="go('../zulinhetong/list.html')">
        <div class="name">合同管理</div>
        <div class="desc">查看租赁合同信息，后续可扩展签约流程</div>
      </div>
      <div class="card" onclick="go('./center.html')">
        <div class="name">个人信息设置</div>
        <div class="desc">修改头像、联系方式等个人信息</div>
      </div>
    </div>
  </div>

  <script>
    function go(url) {
      window.location.href = url;
    }
  </script>
</body>
</html>
