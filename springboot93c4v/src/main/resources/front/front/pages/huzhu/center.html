<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>户主中心</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
<style>
.center-page { max-width: 1100px; margin: 0 auto; padding: 20px; }
.center-tabs { display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 2px solid #0588e6; margin-bottom: 20px; }
.center-tabs .tab { padding: 10px 18px; font-size: 15px; color: #333; cursor: pointer; border-radius: 6px 6px 0 0; }
.center-tabs .tab:hover { color: #0588e6; }
.center-tabs .tab.active { color: #0588e6; font-weight: bold; border-bottom: 2px solid #0588e6; margin-bottom: -2px; }
.center-content { min-height: 400px; }
.center-content .panel { display: none; }
.center-content .panel.active { display: block; }
.center-content .panel iframe { width: 100%; min-height: 560px; border: none; }
.user-card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 8px rgba(0,0,0,.08); max-width: 520px; }
.user-card .avatar { display:flex; align-items:center; gap:12px; margin-bottom: 16px; }
.user-card .avatar img { width:64px; height:64px; border-radius:50%; object-fit:cover; border:2px solid #e6e6e6; }
.user-card .row { margin-bottom: 12px; font-size: 15px; }
.user-card .label { color: #666; margin-right: 8px; }
</style>
</head>
<body>
<div id="app" class="center-page">
  <div class="center-tabs">
    <div class="tab active" data-tab="user">个人中心</div>
    <div class="tab" data-tab="chuzu">出租信息</div>
    <div class="tab" data-tab="zhengming">证明资料</div>
    <div class="tab" data-tab="biaoqian">房屋优点标签</div>
    <div class="tab" data-tab="fangwu">房屋信息</div>
  </div>
  <div class="center-content">
    <div class="panel active" id="panel-user">
      <div class="user-card">
        <div class="avatar">
          <img :src="avatarImg" alt="头像">
          <div>
            <button type="button" class="layui-btn layui-btn-sm" @click="chooseAvatar">更换头像</button>
            <input type="file" id="avatarFile" accept="image/*" style="display:none" />
            <div style="margin-top:6px;color:#999;font-size:12px;">注册默认头像，可在此上传修改</div>
          </div>
        </div>
        <div class="row"><span class="label">账号：</span>{{user.username}}</div>
        <div class="row"><span class="label">姓名：</span>{{user.realName}}</div>
        <div class="row"><span class="label">手机：</span>{{user.phone}}</div>
        <div class="row"><span class="label">邮箱：</span>{{user.email}}</div>
        <div class="row"><span class="label">地址：</span>{{user.address}}</div>
      </div>
    </div>
    <div class="panel" id="panel-chuzu">
      <iframe src="./chuzu.html" id="iframe-chuzu"></iframe>
    </div>
    <div class="panel" id="panel-zhengming">
      <iframe src="./zhengming.html" id="iframe-zhengming"></iframe>
    </div>
    <div class="panel" id="panel-biaoqian">
      <iframe src="./biaoqian.html" id="iframe-biaoqian"></iframe>
    </div>
    <div class="panel" id="panel-fangwu">
      <iframe src="../fangwuxinxi/list.html" id="iframe-fangwu"></iframe>
    </div>
  </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
var vue = new Vue({
  el: '#app',
  data: {
    user: {},
    defaultAvatar: 'http://codegen.caihongy.cn/20201024/ed5e326ca66f403aa3197b5fbb4ec733.jpg',
    avatarImg: 'http://codegen.caihongy.cn/20201024/ed5e326ca66f403aa3197b5fbb4ec733.jpg'
  },
  mounted: function() {
    var userTable = localStorage.getItem('userTable');
    if (!userTable || userTable !== 'huzhu') {
      if (window.parent) window.parent.location.href = '../../index.html';
      else window.location.href = '../login/login.html';
      return;
    }
    var that = this;
    layui.use(['http', 'jquery', 'layer'], function() {
      var http = layui.http, jquery = layui.jquery, layer = layui.layer;
      function refreshSession() {
        http.request(userTable + '/session', 'get', {}, function(res) {
          that.user = res.data || {};
          var avatarVal = that.user.avatar || '';
          if (avatarVal) {
            that.avatarImg = avatarVal.indexOf('http') === 0 ? avatarVal : (http.baseurl + 'file/download?fileName=' + encodeURIComponent(avatarVal));
          } else {
            that.avatarImg = that.defaultAvatar;
          }
        });
      }
      refreshSession();

      jquery('.center-tabs .tab').on('click', function() {
        var tab = jquery(this).data('tab');
        jquery('.center-tabs .tab').removeClass('active');
        jquery(this).addClass('active');
        jquery('.center-content .panel').removeClass('active');
        jquery('#panel-' + tab).addClass('active');
      });

      // 选择并上传头像
      jquery('#avatarFile').on('change', function(e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        http.upload(file, '', function(up) {
          var fileName = up.file;
          http.requestJson('users/updateAvatar', 'post', { avatar: fileName }, function() {
            layer.msg('头像已更新', { time: 1200, icon: 6 });
            refreshSession();
          });
        });
      });
    });
  },
  methods: {
    chooseAvatar: function() {
      var el = document.getElementById('avatarFile');
      if (el) el.click();
    }
  }
});
</script>
</body>
</html>
