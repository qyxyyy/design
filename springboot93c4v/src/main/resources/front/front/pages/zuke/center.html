<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>个人中心</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../layui/css/layui.css">
<link rel="stylesheet" href="../../xznstatic/css/common.css"/>
<link rel="stylesheet" href="../../xznstatic/css/style.css"/>
<style>
.center-page { max-width: 1100px; margin: 0 auto; padding: 20px; }
.center-tabs { display: flex; border-bottom: 2px solid #0588e6; margin-bottom: 20px; }
.center-tabs .tab { padding: 12px 24px; font-size: 16px; color: #333; cursor: pointer; }
.center-tabs .tab:hover { color: #0588e6; }
.center-tabs .tab.active { color: #0588e6; font-weight: bold; border-bottom: 2px solid #0588e6; margin-bottom: -2px; }
.center-content { min-height: 400px; }
.center-content .panel { display: none; }
.center-content .panel.active { display: block; }
.center-content .panel iframe { width: 100%; min-height: 500px; border: none; }
.user-card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 8px rgba(0,0,0,.08); max-width: 400px; }
.user-card .row { margin-bottom: 12px; font-size: 15px; }
.user-card .label { color: #666; margin-right: 8px; }
</style>
</head>
<body>
<div id="app" class="center-page">
  <div class="center-tabs">
    <div class="tab active" data-tab="user">个人中心</div>
    <div class="tab" data-tab="fangwu">房屋信息</div>
    <div class="tab" data-tab="luntan">论坛</div>
  </div>
  <div class="center-content">
    <div class="panel active" id="panel-user">
      <div class="user-card">
        <div class="row"><span class="label">账号：</span>{{user.username}}</div>
        <div class="row"><span class="label">姓名：</span>{{user.realName}}</div>
        <div class="row"><span class="label">手机：</span>{{user.phone}}</div>
        <div class="row"><span class="label">邮箱：</span>{{user.email}}</div>
        <div class="row"><span class="label">地址：</span>{{user.address}}</div>
      </div>
    </div>
    <div class="panel" id="panel-fangwu">
      <iframe src="../fangwuxinxi/list.html" id="iframe-fangwu"></iframe>
    </div>
    <div class="panel" id="panel-luntan">
      <iframe src="../luntan/list.html" id="iframe-luntan"></iframe>
    </div>
  </div>
</div>
<script src="../../layui/layui.js"></script>
<script src="../../js/vue.js"></script>
<script src="../../js/config.js"></script>
<script src="../../modules/config.js"></script>
<script src="../../js/utils.js"></script>
<script>
var vue = new Vue({
  el: '#app',
  data: { user: {} },
  mounted: function() {
    var userTable = localStorage.getItem('userTable');
    if (!userTable || userTable !== 'zuke') {
      if (window.parent) window.parent.location.href = '../../index.html';
      else window.location.href = '../login/login.html';
      return;
    }
    var that = this;
    layui.use(['http', 'jquery'], function() {
      var http = layui.http, jquery = layui.jquery;
      http.request(userTable + '/session', 'get', {}, function(res) {
        that.user = res.data || {};
      });
      jquery('.center-tabs .tab').on('click', function() {
        var tab = jquery(this).data('tab');
        jquery('.center-tabs .tab').removeClass('active');
        jquery(this).addClass('active');
        jquery('.center-content .panel').removeClass('active');
        jquery('#panel-' + tab).addClass('active');
      });
    });
  }
});
</script>
</body>
</html>
