		#header {
			height: auto;

		#header .nav-top {

			border-color: transparent;
			box-shadow: none;
			object-fit: cover;
		}

		#header .nav-top-title {
			line-height: 1.2;
			font-size: 20px;
			color: #2A4365;
			padding: 0;
			margin: 0;
			font-weight: 700;
		}
    #header .nav-top-subtitle {
      font-size: 12px;
      color: #718096;
      margin-top: 2px;
    }

		#header .nav-top-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #header .nav-top-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #E2E8F0;
    }
		#header .nav-top-tel {
			line-height: 1.4;

			color: #2D3748;

			margin: 0;

			border-style: solid;
			border-color: transparent;
			box-shadow: none;
		}

		#header .navs {
			display: flex;

			box-sizing: border-box;

		#header .navs .title {
			width: auto;
			line-height: 1;
			font-size: 18px;

			padding: 0;
			margin: 0;

		}
		#header .navs .list ul {
			display: flex;
			align-items: center;
			gap: 24px;
		}
		#header .navs li {
			display: inline-block;
			width: auto;
			line-height: 56px;
			padding: 0;
			margin: 0;
			color: rgba(255, 255, 255, 0.85);

			border-radius: 0;
			border-width: 0;
			border-style: solid;
			border-color: transparent;
			background-color: transparent;
			box-shadow: none;
      text-align: center;
		}
		#header .navs li a{
			color: inherit;
		}
		#header .navs li.current a{
			color: inherit;
		}
		#header .navs li a:hover{
			color: inherit;
		}
		#header .navs li.current {
			color: #ffffff;
			font-size: 15px;
			position: relative;
		}
		#header .navs li.current::after {
			content: '';
			position: absolute;
			left: 0;
			right: 0;
			bottom: 8px;
			height: 2px;
			background-color: #ED8936;
			border-radius: 999px;
		}
		#header .navs li:hover {
			color: #FBD38D;

	<body>
		<!-- start 顶部导航栏 -->
        <div id="header">
			<div v-if='true' class="nav-top">
        <div class="nav-top-left">
          <img v-if='true' class="nav-top-img" src='./xznstatic/img/logo-home.png'>
          <div>
            <div class="nav-top-title">房屋租赁管理系统</div>
            <div class="nav-top-subtitle">资产可视化 · 智能化招租 · 租客&户主一体化管理</div>
          </div>
        </div>
			  <div class="nav-top-user">
				<img class="nav-top-avatar" :src="avatarImg">
				<div class="nav-top-tel">
					{{ welcomeText }}
					<a href="javascript:void(0)" @click="logout" style="margin-left:12px;color:#2A4365;font-size:12px;padding:4px 8px;border-radius:4px;transition:background-color .15s ease;color:#2A4365;">退出</a>
				</div>
			  </div>
			</div>
		    <div class="navs">
		    	<!-- <div class="logo" style="font-size: 20px;top: 32px;color: #fff;font-weight: bold;margin-left: -200px;width: 240px;" v-text="projectName"></div> -->
				<div class="title" v-if="true">房屋租赁系统</div>
				<div class="list">
					<ul>
						<li class='current'><a href="javascript:navPage('./pages/home/home.html')" class="menumain">首页</a></li>
						<li><a href="javascript:navPage('./pages/gonggaoxinxi/list.html')" class="menumain">公告信息</a></li>
						<li><a href="javascript:navPage('./pages/huzhu/home.html')" class="menumain">户主工作台</a></li>
						<li><a href="javascript:centerPage();" class="menumain">个人中心</a></li>
					</ul>
				</div>
		    </div>
		</div>
		<!-- end 顶部导航栏 -->

		<iframe src="./pages/home/home.html" id="iframe" frameborder="0" scrolling="no" width="100%" onload="changeFrameHeight"></iframe>

    <div id="tabbar" v-if="true" class="tabbar" :style='{"padding":"16px 0","boxShadow":"0 0 0px","margin":"0px 0 0 0","borderColor":"transparent","backgroundColor":"#2A4365","borderRadius":"0","borderWidth":"0","borderStyle":"solid"}' style="position: relative;z-index: 999;">
      <div :style='{"padding":"0 10px","boxShadow":"0 0 0px","margin":"0","borderColor":"transparent","backgroundColor":"transparent","color":"#FFFFFF","textAlign":"center","borderRadius":"0","borderWidth":"0","width":"100%","lineHeight":"32px","fontSize":"14px","borderStyle":"solid"}' class="desc">
        咨询热线：4008000000 | 联系邮箱：support@21epub.com
      </div>
    </div>

		<script src="./xznstatic/js/jquery-1.11.3.min.js"></script>
		<script src="./layui/layui.js"></script>
		<script src="./js/vue.js"></script>
		<script src="./js/config.js"></script>
		<!-- 扩展插件配置信息 -->
		<script src="./modules/config.js"></script>
		<!-- 工具方法（含 http、upload 等） -->
		<script src="./modules/http/http.js"></script>

		<script>
      var vue1 = new Vue({el: '#tabbar'})

			var vue = new Vue({
				el: '#header',
				data: {
					iconArr: ['layui-icon-gift','layui-icon-email','layui-icon-logout','layui-icon-transfer','layui-icon-slider','layui-icon-print','layui-icon-cols','layui-icon-snowflake','layui-icon-note','layui-icon-flag','layui-icon-theme','layui-icon-website','layui-icon-console','layui-icon-face-surprised','layui-icon-template-1','layui-icon-app','layui-icon-read','layui-icon-component','layui-icon-file-b','layui-icon-unlink','layui-icon-tabs','layui-icon-form','layui-icon-chat'],
					indexNav: indexNav,
					cartFlag: cartFlag,
					adminurl: adminurl,
					chatFlag: chatFlag,
					projectName: projectName,
					defaultAvatar: 'http://codegen.caihongy.cn/20201024/ed5e326ca66f403aa3197b5fbb4ec733.jpg',
					avatarImg: 'http://codegen.caihongy.cn/20201024/ed5e326ca66f403aa3197b5fbb4ec733.jpg',
					welcomeText: '欢迎来到我的网站',
				},
				mounted: function() {
					this.bindClickOnLi();
					this.loadWelcome();
				},
				created() {
					this.iconArr.sort(()=>{
					  return (0.5-Math.random())
					});
					// 根据当前登录身份，调整顶部导航模块
					var userTable = localStorage.getItem('userTable');
					if (userTable === 'huzhu') {
						// 户主：顶部入口与导航保持一致
						this.indexNav = [
							{ name: '首页', url: './pages/home/home.html' },
							{ name: '公告信息', url: './pages/gonggaoxinxi/list.html' },
							{ name: '户主工作台', url: './pages/huzhu/home.html' },
							{ name: '个人中心', url: 'center' }
						];
					}
				},
				methods: {
					jump(url) {
						jump(url)
					},
					bindClickOnLi() {
						let list = document.getElementsByTagName("li");
						for(var i = 0;i<list.length;i++){
							list[i].onclick = function(){
								$(this).addClass("current").siblings().removeClass("current");
							}
						}
					},
					loadWelcome() {
						var that = this;
						var token = localStorage.getItem('Token');
						var userTable = localStorage.getItem('userTable'); // users / zuke / huzhu
						var roleName = localStorage.getItem('role') || '';
						if (!token || !userTable) {
							that.avatarImg = that.defaultAvatar;
							that.welcomeText = '欢迎来到我的网站';
							return;
						}
						layui.use(['http'], function() {
							var http = layui.http;
							http.request(userTable + '/session', 'get', {}, function(res) {
								var user = (res && res.data) ? res.data : {};
								var displayName = (user.realName && ('' + user.realName).trim()) ? user.realName : user.username;
								if (!displayName) displayName = localStorage.getItem('adminName') || '';
								var avatarVal = user.avatar || '';
								if (avatarVal) {
									that.avatarImg = avatarVal.indexOf('http') === 0 ? avatarVal : (http.baseurl + 'file/download?fileName=' + encodeURIComponent(avatarVal));
								} else {
									that.avatarImg = that.defaultAvatar;
								}
								that.welcomeText = '欢迎 ' + (displayName || '用户') + (roleName ? (' ' + roleName) : '') + ' 来到网站';
							});
						});
					},
					logout() {
						// 调后端退出（忽略异常）
						var userTable = localStorage.getItem('userTable') || 'users';
						layui.use(['http'], function() {
							var http = layui.http;
							http.request(userTable + '/logout', 'get', {}, function(){});
						});
						// 清理本地状态
						localStorage.removeItem('Token');
						localStorage.removeItem('userTable');
						localStorage.removeItem('sessionTable');
						localStorage.removeItem('role');
						localStorage.removeItem('adminName');
						localStorage.removeItem('userid');
						localStorage.removeItem('iframeUrl');
						window.location.href = './pages/login/login.html';
					}
				}
			});

			layui.use(['element','layer'], function() {
				var element = layui.element;
				var layer = layui.layer;
			});

			function chatTap(){
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					layui.layer.open({
						type: 2,
						title: '客服',
						area: ['600px', '600px'],
						content: './pages/chat/chat.html'
					});
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

			// 导航栏跳转
			function navPage(url) {
				localStorage.setItem('iframeUrl', url);
				document.getElementById('iframe').src = url;
			}

			// 跳转到个人中心也
			function centerPage() {
				var userTable = localStorage.getItem('userTable');
				if (userTable) {
					localStorage.setItem('iframeUrl', './pages/' + userTable + '/center.html');
					document.getElementById('iframe').src = './pages/' + userTable + '/center.html';
				} else {
					window.location.href = './pages/login/login.html'
				}
			}

			var iframeUrl = localStorage.getItem('iframeUrl');
			document.getElementById('iframe').src = iframeUrl  || './pages/home/home.html';

      // var i = 0;
      setInterval(function(){
        // i++;
        // if(i<50) changeFrameHeight();
        changeFrameHeight();
      },200)

      function changeFrameHeight() {
        var iframe = document.getElementById('iframe');
        // iframe.height = 'auto';
          if (iframe) {
              var iframeWin = iframe.contentWindow || iframe.contentDocument.parentWindow;
              if (iframeWin.document.body) {
                  iframe.height = iframeWin.document.body.scrollHeight;
              }
          }
      };

			//  窗口变化时候iframe自适应
			// function changeFrameHeight() {
				// var header = document.getElementById('header').scrollHeight;
    //     let isshow = true
    //     var tabbar = 0
    //     if(isshow) {
    //       tabbar = document.getElementById('tabbar').scrollHeight
    //     }
				// var ifm = document.getElementById("iframe");
				// ifm.height = document.documentElement.clientHeight - header - tabbar;
				// ifm.width = document.documentElement.clientWidth;
			// }

			// reasize 事件 窗口大小变化后执行的方法
			window.onresize = function() {
				changeFrameHeight();
			}
		</script>
	</body>
</html>
